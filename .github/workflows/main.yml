name: 程序部署

on:
  push:
    branches:
      - main

jobs:
  build-push:
    if: contains(github.event.head_commit.message, '部署') || contains(github.event.head_commit.message, '更新')
    runs-on: ubuntu-latest
    steps:
      - name: Start Notify
        run: curl "https://sctapi.ftqq.com/${{ vars.SCT_AK }}.send?title=🟡${{ github.event.repository.name }}&desp=已开始部署"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies (with fixes)
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Login Aliyun Docker
        uses: docker/login-action@v3
        with:
          registry: registry.cn-beijing.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: registry.cn-beijing.aliyuncs.com/xxdl_work/${{ github.event.repository.name }}:latest
  deploy:
    if: contains(github.event.head_commit.message, '部署') || contains(github.event.head_commit.message, '更新')
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH into server and deploy
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            sudo docker stop ${{ github.event.repository.name }} || true
            sudo docker rm ${{ github.event.repository.name }} || true
            sudo docker login registry.cn-beijing.aliyuncs.com -u ${{ secrets.ALIYUN_USERNAME }} -p ${{ secrets.ALIYUN_PASSWORD }}
            sudo docker pull registry.cn-beijing.aliyuncs.com/xxdl_work/${{ github.event.repository.name }}:latest
            sudo docker run -d \
            -p ${{ vars.EXT_PORT }}:3000 \
            --name ${{ github.event.repository.name }} \
            -v /opt/xxdl-wedding/public:/app/public \
            registry.cn-beijing.aliyuncs.com/xxdl_work/${{ github.event.repository.name }}:latest
            rm -f ~/.docker/config.json
# 第三个Job：发送通知（依赖于前面所有job）
  send-notification:
    if: contains(github.event.head_commit.message, '部署')
    needs: [deploy]

    runs-on: ubuntu-latest
    steps:
      # 新增代码检出步骤，解决git命令无法执行的问题
      - name: Checkout code for commit info
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 只拉取最新的一个提交，加快速度

      - name: Calculate deployment time
        id: time_calc
        run: |
          start_time=${{ needs.build.outputs.start_time }}
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          mins=$((duration / 60))
          secs=$((duration % 60))
          echo "duration=${mins}分${secs}秒" >> $GITHUB_OUTPUT
          echo "current_time=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Determine status
        id: status_check
        run: |
          echo "status=成功" >> $GITHUB_OUTPUT
          echo "status_emoji=🟢" >> $GITHUB_OUTPUT
      - name: Get commit info
        id: commit_info
        run: |
          # 现在可以正常执行git命令了
          commit_msg=$(git log -1 --pretty=format:"%s")
          commit_hash=$(git rev-parse --short HEAD)
          echo "commit_msg=${commit_msg}" >> $GITHUB_OUTPUT
          echo "commit_hash=${commit_hash}" >> $GITHUB_OUTPUT

      - name: Send notification
        run: |
          title="${{ steps.status_check.outputs.status_emoji }}${{ github.event.repository.name }}部署${{ steps.status_check.outputs.status }}"
          desp="部署状态：${{ steps.status_check.outputs.status }}
          部署耗时：${{ steps.time_calc.outputs.duration }}
          提交信息：${{ steps.commit_info.outputs.commit_msg }}
          提交哈希：${{ steps.commit_info.outputs.commit_hash }}
          完成时间：${{ steps.time_calc.outputs.current_time }}"
          
          curl -s "https://sctapi.ftqq.com/${{ vars.SCT_AK }}.send" \
            -d "title=${title}" \
            -d "desp=${desp}"